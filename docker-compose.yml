version: "3.9"

services:
  # =========================================================
  # Kafka (modo KRaft, sem Zookeeper)
  # =========================================================
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voting-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - voting-net

  # =========================================================
  # Redis
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - voting-net

  # =========================================================
  # API (Sinatra - VotingApp + AdminApp via config.ru)
  # =========================================================
  api:
    build:
      context: ./api
    container_name: api
    ports:
      - "9292:9292"
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: votes
      ADMIN_API_KEY: ${ADMIN_API_KEY:?defina ADMIN_API_KEY em .env (veja .env.example)}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_POOL_SIZE: 20
      SKIP_PROOF_OF_WORK: ${SKIP_PROOF_OF_WORK:-false}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: ["bundle", "exec", "falcon", "serve", "--bind", "http://0.0.0.0:9292", "--count", "8"]
    volumes:
      - ./api:/app
      - api-logs:/app/log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voting-net

  # =========================================================
  # Consumer (Karafka - processa o tópico "votes")
  # =========================================================
  consumer:
    build:
      context: ./api
    container_name: consumer
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: votes
      ADMIN_API_KEY: ${ADMIN_API_KEY:?defina ADMIN_API_KEY em .env (veja .env.example)}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: ["bundle", "exec", "karafka", "server"]
    stop_grace_period: 65s
    volumes:
      - ./api:/app
    networks:
      - voting-net

  # =========================================================
  # Frontend
  # =========================================================
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
    depends_on:
      - api
    networks:
      - voting-net

  # =========================================================
  # Observabilidade
  # =========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    networks:
      - voting-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - voting-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - voting-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - api-logs:/var/log/api:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    networks:
      - voting-net

  # =========================================================
  # Load testing (hey) - uso: docker compose run --rm hey -n 10000 -c 100 ...
  # =========================================================
  hey:
    image: williamyeh/hey
    profiles: ["tools"]
    networks:
      - voting-net

volumes:
  redis-data:
  grafana-data:
  api-logs:

networks:
  voting-net:
    driver: bridge