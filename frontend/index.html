<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Votação</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container" style="max-width: 480px; margin-top: 40px;">
      <h1 class="h4 mb-4">Vote no seu candidato</h1>
      <div id="candidates" class="d-grid gap-2 mb-3"></div>
      <div id="status" class="alert d-none" role="alert"></div>
      <div id="results"></div>
    </div>

    <script>
      const API_BASE = 'http://localhost:9292';

      async function sha256Hex(text) {
        const data = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer))
          .map((b) => b.toString(16).padStart(2, '0'))
          .join('');
      }

      async function solveChallenge(challenge, prefix = '0000') {
        let nonce = 0;
        while (true) {
          const hash = await sha256Hex(challenge + nonce);
          if (hash.startsWith(prefix)) return nonce;
          nonce++;
        }
      }

      const ALERT_CLASS = { success: 'alert-success', error: 'alert-danger', pending: 'alert-warning' };

      function setStatus(message, kind) {
        const el = document.getElementById('status');
        el.textContent = message;
        el.className = `alert ${ALERT_CLASS[kind]}`;
      }

      let currentPollId = null;

      async function loadPoll() {
        const res = await fetch(`${API_BASE}/poll`);
        const data = await res.json();
        currentPollId = data.poll_id;

        if (data.status_value !== 'active') {
          setStatus('Nenhuma votação ativa no momento.', 'error');
          return;
        }

        const container = document.getElementById('candidates');
        container.innerHTML = '';

        Object.entries(data.candidates).forEach(([id, name]) => {
          const button = document.createElement('button');
          button.className = 'btn btn-primary btn-lg';
          button.textContent = name;
          button.onclick = () => vote(id, button);
          container.appendChild(button);
        });

        await loadResults();
      }

      async function loadResults() {
        if (!currentPollId) return null;

        const res = await fetch(`${API_BASE}/votes/summary/${currentPollId}`);
        if (!res.ok) return null;
        const data = await res.json();

        const total = data.total_votes || 0;
        const container = document.getElementById('results');
        container.innerHTML = '<h2 class="h6">Resultado parcial</h2>';

        Object.values(data.summary).forEach(({ name, total_votes }) => {
          const pct = total > 0 ? ((total_votes / total) * 100).toFixed(1) : '0.0';
          const row = document.createElement('div');
          row.className = 'mb-2';
          row.innerHTML = `
            <div class="small">${name} — ${total_votes} votos (${pct}%)</div>
            <div class="progress" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
              <div class="progress-bar" style="width: ${pct}%">${pct}%</div>
            </div>
          `;
          container.appendChild(row);
        });

        return total;
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      // o voto é processado de forma assíncrona (API -> Kafka -> consumer -> Redis),
      // então tenta algumas vezes até o total mudar, em vez de assumir que já refletiu
      async function waitForUpdatedResults(previousTotal, { attempts = 10, intervalMs = 800 } = {}) {
        for (let i = 0; i < attempts; i++) {
          await sleep(intervalMs);
          const total = await loadResults();
          if (total !== null && total !== previousTotal) return;
        }
      }

      async function vote(candidateId, button) {
        document.querySelectorAll('button').forEach((b) => (b.disabled = true));
        setStatus('Confirmando que você não é um robô...', 'pending');

        try {
          const previousTotal = await loadResults();

          const challengeRes = await fetch(`${API_BASE}/votes/challenge`);
          const { challenge } = await challengeRes.json();

          const nonce = await solveChallenge(challenge);

          setStatus('Enviando voto...', 'pending');

          const voteRes = await fetch(`${API_BASE}/votes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ candidate_id: candidateId, challenge_token: challenge, nonce: String(nonce) }),
          });
          const voteData = await voteRes.json();

          if (voteRes.ok) {
            setStatus('Voto registrado! Atualizando resultado...', 'success');
            await waitForUpdatedResults(previousTotal);
            setStatus('Voto registrado com sucesso!', 'success');
          } else {
            setStatus(voteData.message || 'Erro ao votar.', 'error');
          }
        } catch (err) {
          setStatus('Erro de conexão com o servidor.', 'error');
        } finally {
          document.querySelectorAll('button').forEach((b) => (b.disabled = false));
        }
      }

      loadPoll();
    </script>
  </body>
</html>
